---
dependency:
  name: galaxy
driver:
  name: docker
lint: |
  set -e
  yamllint .
  ansible-lint
  flake8
platforms:
  - name: instance-ubi8.8-1-${INSTANCE_ID:-local}
    image: docker.artifactory.imp.ac.at/vbc/ubi8/tde:8.8-1
    privileged: true
provisioner:
  name: ansible
  env:
    OP_SERVICE_ACCOUNT_TOKEN: ${OP_SERVICE_ACCOUNT_TOKEN}
    INSTANCE_ID: ${INSTANCE_ID:-local}
scenario:
  name: default
verifier:
  name: testinfra
  env:
    INSTANCE_ID: ${INSTANCE_ID:-local}
