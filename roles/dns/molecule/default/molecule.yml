---
dependency:
  name: galaxy
driver:
  name: docker
lint: |
  set -e
  yamllint .
  ansible-lint
  flake8
platforms:
  - name: instance-ubi8.4-1-${INSTANCE_ID:-local}
    image: docker.artifactory.imp.ac.at/vbc/ubi8/tde:8.4-1
    privileged: true
provisioner:
  name: ansible
  options:
    extra-vars: "@${ONEPASS_VARS:-/missing/1password/credentials.file}"
  env:
    ONEPASS_VARS: "${ONEPASS_VARS}"
    INSTANCE_ID: "${INSTANCE_ID:-local}"
scenario:
  name: default
verifier:
  name: testinfra
  env:
    INSTANCE_ID: "${INSTANCE_ID:-local}"
