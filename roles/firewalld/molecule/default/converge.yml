---
- name: Converge
  hosts: all
  tasks:
    - name: Include firewalld role
      ansible.builtin.include_role:
        name: firewalld
      vars:
        role_firewalld_present: true
        role_firewalld_default_zone: public
        role_firewalld_interfaces:
          - ifname:
            zone:
            services:
              - ssh
            ports:
              - 9999/udp
