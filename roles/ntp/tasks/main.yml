---
- name: Make sure tzdata is installed
  yum:
    name: tzdata
    state: present

- name: Make sure ntp is absent
  yum:
    name: ntp
    state: absent

- name: Make sure chrony is installed
  yum:
    name: chrony
    # i would not use 'latest' here because version mgmt should be done with satellite, not ansible
    state: present

- name: Ensure proper permissions on /run/chrony
  file:
    path: /run/chrony
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Make sure proper chrony.conf is in place
  template:
    src: chrony.conf.j2
    dest: /etc/chrony.conf
    mode: "0644"
    owner: root
    group: root
    backup: true
  notify:
    - restart-chronyd

- name: Make sure timezone is set
  timezone:
    name: "{{ role_ntp_timezone }}"

