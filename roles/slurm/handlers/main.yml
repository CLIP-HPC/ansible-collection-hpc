---
- name: Restart slurmdbd
  ansible.builtin.service:
    name: slurmdbd
    state: restarted
  delegate_to: "{{ slurm_db_host }}"
  run_once: true
  when:
    - slurm_db_host is defined
    - slurm_service_started | bool
    - slurm_db_host in play_hosts
  listen: Restart slurmdbd service


- name: Check slurmdbd actually restarted
  ansible.builtin.wait_for:
    port: "{{ slurm_dbd_port }}"
  delegate_to: "{{ slurm_db_host }}"
  run_once: true
  when:
    - slurm_db_host is defined
    - slurm_service_started | bool
    - slurm_db_host in play_hosts
  listen: Restart slurmdbd service

- name: Restart slurmctld
  ansible.builtin.service:
    name: slurmctld
    state: restarted
  delegate_to: "{{ slurm_control_host }}"
  run_once: true
  when:
    - slurm_service_started | bool
    - not (slurm_reconfigure | bool)
    - slurm_control_host in play_hosts
  listen: Restart slurmctld service

- name: Check slurmctld actually restarted
  ansible.builtin.wait_for:
    port: 6817
    delay: 10
  delegate_to: "{{ slurm_control_host }}"
  run_once: true
  when:
    - slurm_service_started | bool
    - slurm_control_host in play_hosts
  listen: Restart slurmctld service


- name: Restart slurmrestd
  ansible.builtin.systemd:
    name: slurmrestd
    daemon_reload: true
    state: restarted
  delegate_to: "{{ slurm_control_host }}"
  run_once: true
  when:
    - not (slurm_reconfigure | bool)
    - slurm_control_host in play_hosts

- name: Restart slurmd service
  ansible.builtin.service:
    name: "slurmd"
    state: restarted
  retries: 5
  register: slurmd_restart
  until: slurmd_restart is success
  delay: 30
  when:
    - slurm_service_started | bool
    - slurm_enable.batch | default(false) | bool
    - not (slurm_reconfigure | bool)
    # 2nd condition required as notification happens on controller, which isn't necessarily a compute note


- name: Reconfigure slurmctld
  run_once: true
  delegate_to: "{{ slurm_control_host }}"
  ansible.builtin.command: /bin/scontrol reconfigure
  changed_when: true
  when:
    - slurm_service_started | bool
    - slurm_control_host in play_hosts


- name: Reload facts
  ansible.builtin.setup:
    filter: ansible_local
