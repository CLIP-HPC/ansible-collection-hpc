---
- name: facts | Capture configuration from scontrol
  # this includes any dynamically-generated config, not just what is set in
  # slurm.conf
  ansible.builtin.command: scontrol show config
  changed_when: false
  register: slurm_scontrol_config

- name: facts | Create facts directory
  ansible.builtin.file:
    path: /etc/ansible/facts.d/
    state: directory
    owner: root
    group: root
    mode: ugo=rwX

- name: facts | Template slurm configuration facts
  ansible.builtin.copy:
    dest: /etc/ansible/facts.d/slurm.fact
    content: "{{ slurm_scontrol_config.stdout_lines | clip.hpc.config2dict | to_nice_json }}"
    owner: slurm
    group: slurm
    mode: ug=rw,o=r # any user can run scontrol show config anyway
  register: slurm_template_facts
  notify: Reload facts
