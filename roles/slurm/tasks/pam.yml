---

- name: pam | Add pam_slurm_adopt and pam_access to SSH PAM configuration
  tags:
    - pam
  ansible.builtin.blockinfile:
    path: /etc/pam.d/sshd
    insertafter: '^account\s+include\s+password-auth'
    block: |
      account    sufficient   pam_slurm_adopt.so action_no_jobs=deny action_unknown=newest action_adopt_failure=deny action_generic_failure=deny
      account    required     pam_access.so
    backup: true


- name: pam | Fix pam_systemd lines in /etc/pam.d/ auth files
  tags:
    - pam
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: -session     optional      pam_systemd.so
    line: "#-session     optional      pam_systemd.so"
  loop:
    - /etc/pam.d/system-auth
    - /etc/pam.d/password-auth


