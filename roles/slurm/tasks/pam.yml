- name: pam | Fix /etc/security/access.conf
  tags:
    - pam
  ansible.builtin.blockinfile:
    path: /etc/security/access.conf
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    insertafter: EOF
    block: |
      {% for item in slurm_ssh_access | default([]) %}+:{{ item }}:ALL
      {% endfor %}
      {% if ansible_user is defined %}+:{{ ansible_user }}:ALL
      {% endif %}
      -:ALL:ALL

- name: pam | Check if SELinux module is installed
  tags:
    - pam
  ansible.builtin.command:
    cmd: semodule -l | grep -q '^pam_slurm_adopt'
  register: semodule_check
  failed_when: false
  changed_when: false
  when: ansible_selinux.status == "enabled"

- name: pam | Configure SELinux Policy for SLURM adopt
  tags:
    - pam
  when: ansible_selinux.status == "enabled" and semodule_check.rc != 0
  block:
    - name: pam | Create temporary directory for SELinux policy
      tags:
        - pam
      ansible.builtin.tempfile:
        state: directory
        suffix: selinux
      register: selinux_tempdir

    - name: pam | Copy SELinux policy file
      tags:
        - pam
      ansible.builtin.copy:
        src: pam_slurm_adopt.te
        dest: "{{ selinux_tempdir.path }}/pam_slurm_adopt.te"
        mode: '0644'

    - name: pam | Package SELinux policy module
      tags:
        - pam
      ansible.builtin.command:
        cmd: "make -f /usr/share/selinux/devel/Makefile pam_slurm_adopt.pp"
        creates: "{{ selinux_tempdir.path }}/pam_slurm_adopt.pp"
      args:
        chdir: "{{ selinux_tempdir.path }}"

    - name: pam | Install SELinux policy module
      tags:
        - pam
      ansible.builtin.command:
        cmd: "semodule -i {{ selinux_tempdir.path }}/pam_slurm_adopt.pp"
      register: semodule_install
      changed_when: semodule_install.rc == 0

    - name: pam | Cleanup temporary directory
      tags:
        - pam
      ansible.builtin.file:
        path: "{{ selinux_tempdir.path }}"
        state: absent
