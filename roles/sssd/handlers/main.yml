---
# handlers file for sssd_ldap
- name: Restart realmd
  ansible.builtin.service:
    name: realmd
    state: restarted

- name: Restart sssd
  ansible.builtin.service:
    name: sssd
    enabled: true
    state: restarted

- name: Restart sshd
  ansible.builtin.service:
    name: sshd
    state: restarted
