---
dependency:
  name: galaxy
driver:
  name: docker
lint: |
  set -e
  yamllint .
  ansible-lint
  flake8
platforms:
  - name: "instance-centos7-${INSTANCE_ID:-local}"
    hostname: inst-cent7.imp.ac.at
    image: docker.artifactory.imp.ac.at/it/molecule/centos7:latest
    command: /usr/sbin/init
    privileged: true
provisioner:
  name: ansible
  options:
    extra-vars: "@${ONEPASS_VARS:-/missing/1password/credentials.file}"
  env:
    ONEPASS_VARS: "${ONEPASS_VARS}"
scenario:
  name: default-centos7
  create_sequence:
    - create
    - prepare
  check_sequence:
    - destroy
    - dependency
    - create
    - prepare
    - converge
    - check
    - side_effect
    - destroy
  converge_sequence:
    - dependency
    - create
    - prepare
    - converge
  destroy_sequence:
    - side_effect
    - destroy
  test_sequence:
    - lint
    - destroy
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - side_effect
    - destroy
verifier:
  name: testinfra
