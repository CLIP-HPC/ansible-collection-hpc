---
- name: Un-enroll machine
  hosts: all
  gather_facts: false
  vars_files:
    - ../../vars/main.yml
  vars:
    ad_password: "{{ lookup('onepassword', 'svc_realmd_test_join', vault='accounts', \
      service_account_token=lookup('ansible.builtin.env', 'OP_SERVICE_ACCOUNT_TOKEN')) }}"
  tasks:
    - name: Un-enroll machines
      ansible.builtin.shell: >
        set -o pipefail;
        echo {{ ad_password }} | realm leave --unattended --verbose -U {{ role_sssd_domains.TESTING.ad_username }} {{ role_sssd_domains.TESTING.name }}
      failed_when: false
      changed_when: false
