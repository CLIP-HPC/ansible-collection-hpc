---
- name: Converge
  hosts: all
  vars:
    role_sssd_allowed_groups: [is.grp]
    ad_password: "{{ lookup('onepassword', 'svc_realmd_test_join', vault='accounts', \
      master_password=onepass_password, secret_key=onepass_secret_key, subdomain=onepass_domain, \
      username=onepass_email) }}"

  tasks:
    - name: Include sssd role
      ansible.builtin.include_role:
        name: sssd
      vars:
        role_sssd_domain: TESTING
        role_sssd_present: false
        role_sssd_ad_password: "{{ ad_password }}"
