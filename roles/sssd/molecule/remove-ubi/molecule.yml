---
dependency:
  name: galaxy
driver:
  name: docker
lint: |
  set -e
  yamllint .
  ansible-lint
  flake8
platforms:
  - name: instance-ubi8.8-1-${INSTANCE_ID:-local}
    image: docker.artifactory.imp.ac.at/vbc/ubi8/tde:8.8-1
    privileged: true
    command: /sbin/init
    hostname: inst-ubi-rem.imp.ac.at
provisioner:
  name: ansible
  options:
    extra-vars: "@${ONEPASS_VARS:-/missing/1password/credentials.file}"
  env:
    ONEPASS_VARS: "${ONEPASS_VARS}"
scenario:
  name: remove-ubi
verifier:
  name: testinfra
