---
- name: Prepare
  hosts: all
  vars:
    role_sssd_domain: TESTING
    ad_password: "{{ lookup('onepassword', 'svc_realmd_test_join', vault='accounts', \
      service_account_token=lookup('ansible.builtin.env', 'OP_SERVICE_ACCOUNT_TOKEN')) }}"
  tasks:
    - name: Install sshd
      ansible.builtin.yum:
        name: openssh-server
        state: present
    - name: Include sssd role
      ansible.builtin.include_role:
        name: sssd
      vars:
        role_sssd_domain: TESTING
        role_sssd_ad_password: "{{ ad_password }}"
