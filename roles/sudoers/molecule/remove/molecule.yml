---
dependency:
  name: galaxy
driver:
  name: docker
lint: |
  set -e
  yamllint .
  ansible-lint
  flake8
platforms:
  - name: instance-centos7-${INSTANCE_ID:-local}
    image: docker.artifactory.imp.ac.at/it/molecule/centos7:latest
    command: /usr/sbin/init
    privileged: true
  - name: instance-centos8-${INSTANCE_ID:-local}
    image: docker.artifactory.imp.ac.at/it/molecule/centos8:latest
    command: /usr/sbin/init
    privileged: true
  - name: instance-ubi8.4-1-${INSTANCE_ID:-local}
    image: docker.artifactory.imp.ac.at/vbc/ubi8/tde:8.4-1
    privileged: true
    command: /sbin/init
provisioner:
  name: ansible
scenario:
  name: remove
verifier:
  name: testinfra
