---
# setup forwarding client

- name: Put rsyslog templates into place
  become: true
  ansible.builtin.template:
    src: rsyslog_client/{{ item }}.j2
    dest: /etc/rsyslog.d/{{ item }}
    mode: "0644"
  loop:
    - globals.conf
    - resilient.conf
  notify:
    - Restart syslog

- name: Flush handlers to activate syslog forwarding
  ansible.builtin.meta: flush_handlers
